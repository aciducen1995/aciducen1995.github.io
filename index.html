<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Please Forgive Me</title>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        /* CSS Variables & Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated Starry Background */
        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }
        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle infinite alternate;
        }

        @keyframes twinkle {
            0% { opacity: 0.2; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.2); }
        }

        /* Main Content Container */
        .container {
            z-index: 10;
            text-align: center;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 650px;
            width: 90%;
            transform: translateY(20px);
            opacity: 0;
            animation: slideUp 1.5s ease forwards;
        }

        @keyframes slideUp {
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            font-family: 'Pacifico', cursive;
            font-size: 3rem;
            color: #ff6b81;
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(255, 107, 129, 0.6);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 20px;
            min-height: 80px; 
        }

        /* Image Gallery */
        .gallery {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            opacity: 0; 
            transform: translateY(20px);
            transition: opacity 1s ease, transform 1s ease;
        }

        .gallery img {
            width: 120px;
            height: 120px;
            object-fit: cover;
            border-radius: 12px;
            border: 3px solid rgba(255, 255, 255, 0.8);
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .gallery img:nth-child(odd):hover {
            transform: scale(1.2) rotate(5deg);
            border-color: #ff6b81;
            z-index: 5;
        }
        
        .gallery img:nth-child(even):hover {
            transform: scale(1.2) rotate(-5deg);
            border-color: #ff6b81;
            z-index: 5;
        }

        /* Buttons Area - FIXED FOR MOBILE */
        .btn-container {
            position: relative;
            display: flex;
            justify-content: center;
            gap: 15px;
            align-items: center;
            min-height: 60px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: 600;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s ease;
            font-family: 'Poppins', sans-serif;
            z-index: 10;
        }

        #yes-btn {
            background: linear-gradient(45deg, #ff6b81, #ff4757);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }

        #yes-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.6);
        }

        #no-btn {
            background: #dfe4ea;
            color: #2f3542;
            /* Will be changed to fixed position via JS when touched */
        }

        /* Hidden Success Message */
        #success-msg {
            display: none;
            margin-top: 20px;
            font-size: 1.5rem;
            color: #7bed9f;
            font-weight: bold;
            animation: fadeIn 1s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            z-index: 10;
        }

        /* MOBILE RESPONSIVE QUERIES */
        @media (max-width: 600px) {
            .container {
                padding: 25px 15px;
            }
            h1 {
                font-size: 2.2rem;
            }
            p {
                font-size: 1rem;
                min-height: 100px;
            }
            .gallery img {
                width: 90px; /* Smaller images for phone */
                height: 90px;
            }
            button {
                padding: 10px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <div class="stars" id="stars"></div>

    <div class="container" id="main-card">
        <h1>I'm So Sorry...</h1>
        <p id="typing-text"></p>

        <div class="gallery" id="gallery">
            <img src="pic1.jpg" alt="Us 1">
            <img src="pic2.jpg" alt="Us 2">
            <img src="pic3.jpg" alt="Us 3">
            <img src="pic4.jpg" alt="Us 4">
        </div>
        
        <div class="btn-container" id="action-buttons">
            <button id="yes-btn">I Forgive You ❤️</button>
            <button id="no-btn">No 😔</button>
        </div>

        <div id="success-msg">Thank you! You are the best thing in my life. 🥰</div>
    </div>

    <div class="footer">
        &copy; 2026 Abdul Raffie
    </div>

    <script>
        // --- 1. Background Star Animation ---
        const starContainer = document.getElementById('stars');
        for(let i = 0; i < 70; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            star.style.width = Math.random() * 3 + 'px';
            star.style.height = star.style.width;
            star.style.left = Math.random() * 100 + 'vw';
            star.style.top = Math.random() * 100 + 'vh';
            star.style.animationDuration = (Math.random() * 2 + 1) + 's';
            star.style.animationDelay = Math.random() * 2 + 's';
            starContainer.appendChild(star);
        }

        // --- 2. Typing Effect ---
        const text = "I know I messed up, and I can't stand seeing you upset. You mean the world to me. Can we put this behind us? Will you forgive me?";
        let index = 0;
        const speed = 40; 
        
        function typeWriter() {
            if (index < text.length) {
                document.getElementById("typing-text").innerHTML += text.charAt(index);
                index++;
                setTimeout(typeWriter, speed);
            } else {
                const gallery = document.getElementById('gallery');
                gallery.style.opacity = '1';
                gallery.style.transform = 'translateY(0)';
            }
        }
        
        setTimeout(typeWriter, 1000);

        // --- 3. FIX: Interactive "Runaway" No Button for Mobile/PC ---
        const noBtn = document.getElementById('no-btn');
        const yesBtn = document.getElementById('yes-btn');
        
        function moveNoButton(e) {
            e.preventDefault(); // Prevents tapping from registering as a click
            
            // Switch to fixed positioning to fly around the whole screen
            noBtn.style.position = 'fixed';
            noBtn.style.zIndex = '9999';
            
            // Calculate a random position keeping it inside the screen bounds
            const maxX = window.innerWidth - noBtn.offsetWidth;
            const maxY = window.innerHeight - noBtn.offsetHeight;
            
            const randomX = Math.floor(Math.random() * maxX);
            const randomY = Math.floor(Math.random() * maxY);

            noBtn.style.left = `${randomX}px`;
            noBtn.style.top = `${randomY}px`;
            noBtn.style.transform = `none`; // Reset any previous transform
        }

        // Listen to BOTH mouse hover (PC) and touch start (Mobile)
        ['mouseover', 'touchstart', 'click'].forEach(eventType => {
            noBtn.addEventListener(eventType, moveNoButton, {passive: false});
        });

        // --- 4. Success Action (Confetti) ---
        yesBtn.addEventListener('click', () => {
            document.getElementById('action-buttons').style.display = 'none';
            document.getElementById('gallery').style.display = 'none';
            document.getElementById('typing-text').style.display = 'none';
            
            document.getElementById('success-msg').style.display = 'block';

            var duration = 4 * 1000;
            var animationEnd = Date.now() + duration;
            var defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 100 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            var interval = setInterval(function() {
                var timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                var particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 } }));
                confetti(Object.assign({}, defaults, { particleCount, origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 } }));
            }, 250);
        });
    </script>
</body>
</html>
